<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risk Rule Management</title>
    <link rel="stylesheet" th:href="@{/css/risk-rules.css}" href="risk-rules.css" />
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Risk Rule Management</h1>
        <a href="/dashboard">Kembali ke Dashboard</a>
    </div>

    <p th:if="${successMessage}" th:text="${successMessage}" class="flash-success"></p>
    <p th:if="${errorMessage}" th:text="${errorMessage}" class="flash-error"></p>

    <div class="grid">
        <div class="card">
            <h3 th:text="${editMode} ? 'Edit Rule' : 'Tambah Rule Baru'"></h3>

            <form th:action="${editMode} ? @{'/risk-rules/' + ${editId}} : @{/risk-rules}" th:object="${riskRuleForm}" method="post">
                <label>Nama Rule</label>
                <input th:field="*{ruleName}" placeholder="Contoh: Late Night Visit"/>
                <div class="field-error" th:if="${#fields.hasErrors('ruleName')}" th:errors="*{ruleName}"></div>

                <label>Tipe Kondisi</label>
                <select th:field="*{conditionType}">
                    <option value="">-- Pilih --</option>
                    <option th:each="type : ${conditionTypes}" th:value="${type}" th:text="${type}"></option>
                </select>
                <div class="field-error" th:if="${#fields.hasErrors('conditionType')}" th:errors="*{conditionType}"></div>

                <label>Nilai Kondisi</label>
                <input th:field="*{conditionValue}" placeholder="Contoh: 22-05 atau 10"/>
                <div class="field-error" th:if="${#fields.hasErrors('conditionValue')}" th:errors="*{conditionValue}"></div>

                <label>Risk Level</label>
                <select th:field="*{riskLevel}">
                    <option value="">-- Pilih --</option>
                    <option th:each="level : ${riskLevels}" th:value="${level}" th:text="${level}"></option>
                </select>
                <div class="field-error" th:if="${#fields.hasErrors('riskLevel')}" th:errors="*{riskLevel}"></div>

                <label>Score Contribution</label>
                <input type="number" th:field="*{scoreContribution}" min="0" max="100"/>
                <div class="field-error" th:if="${#fields.hasErrors('scoreContribution')}" th:errors="*{scoreContribution}"></div>

                <div class="checkbox-row">
                    <input type="checkbox" th:field="*{active}"/>
                    <span>Active</span>
                </div>

                <div class="btn-row">
                    <button type="submit" th:text="${editMode} ? 'Update Rule' : 'Simpan Rule'"></button>
                    <a class="btn-secondary" href="/risk-rules" th:if="${editMode}">Batal Edit</a>
                </div>
            </form>
        </div>

        <div class="card">
            <h3>Daftar Risk Rule</h3>
            <table>
                <thead>
                <tr>
                    <th>Rule</th>
                    <th>Kondisi</th>
                    <th>Risk</th>
                    <th>Score</th>
                    <th>Status</th>
                    <th>Aksi</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(rules)}">
                    <td colspan="6">Belum ada risk rule.</td>
                </tr>
                <tr th:each="rule : ${rules}">
                    <td th:text="${rule.ruleName}"></td>
                    <td><span th:text="${rule.conditionType}"></span>: <span th:text="${rule.conditionValue}"></span></td>
                    <td th:text="${rule.riskLevel}"></td>
                    <td th:text="${rule.scoreContribution}"></td>
                    <td>
                        <span th:if="${rule.active}" class="badge-on">ACTIVE</span>
                        <span th:unless="${rule.active}" class="badge-off">INACTIVE</span>
                    </td>
                    <td>
                        <div class="action-row">
                            <a class="btn-edit" th:href="@{'/risk-rules/' + ${rule.id} + '/edit'}">Edit</a>
                            <button class="btn-danger" type="button" th:data-rule-id="${rule.id}" th:data-rule-name="${rule.ruleName}" onclick="showDeleteModal(this)">Hapus</button>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div id="deleteModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Konfirmasi Hapus</h3>
            <span class="close" onclick="closeDeleteModal()">&times;</span>
        </div>
        <div class="modal-body">
            <p>Apakah Anda yakin ingin menghapus risk rule <strong id="deleteRuleName"></strong>?</p>
            <p class="warning">Tindakan ini tidak dapat dibatalkan.</p>
        </div>
        <div class="modal-footer">
            <form id="deleteForm" method="post">
                <button type="button" class="btn-secondary" onclick="closeDeleteModal()">Batal</button>
                <button type="submit" class="btn-danger">Hapus</button>
            </form>
        </div>
    </div>
</div>

<script th:src="@{/js/risk-rules.js}" src="risk-rules.js"></script>

</body>
</html>
