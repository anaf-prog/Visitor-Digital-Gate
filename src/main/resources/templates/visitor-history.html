<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor History - 30 Days</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" href="dashboard.css" />
    <link rel="stylesheet" th:href="@{/css/visitor-history.css}" href="visitor-history.css" />
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Data Visitor 30 Hari Terakhir</h1>
        <div class="nav-actions">
            <a href="/dashboard" class="back-link">← Kembali ke Dashboard</a>
            <button id="refreshBtn" type="button">Refresh</button>
        </div>
    </div>

    <!-- Filter Section -->
    <div class="card filter-section">
        <h3>Filter Data</h3>
        <div class="filter-grid">
            <div class="filter-group">
                <label for="filterNama">Nama</label>
                <input type="text" id="filterNama" placeholder="Cari berdasarkan nama">
            </div>
            <div class="filter-group">
                <label for="filterNik">NIK</label>
                <input type="text" id="filterNik" placeholder="Cari berdasarkan NIK">
            </div>
            <div class="filter-group">
                <label for="filterTujuan">Tujuan</label>
                <input type="text" id="filterTujuan" placeholder="Cari berdasarkan tujuan">
            </div>
            <div class="filter-group">
                <label for="filterCheckin">Jam Checkin</label>
                <input type="time" id="filterCheckin">
            </div>
            <div class="filter-actions">
                <button id="applyFilterBtn" type="button" class="filter-btn">Terapkan Filter</button>
                <button id="clearFilterBtn" type="button" class="filter-btn clear">Hapus Filter</button>
            </div>
        </div>
    </div>

    <!-- Data Table -->
    <div class="card">
        <div class="top-actions">
            <h3 style="margin: 0;">Data Visitor</h3>
            <div class="table-info">
                <span id="recordCount">Memuat data...</span>
            </div>
        </div>
        
        <div class="table-wrapper">
            <table>
                <thead>
                <tr>
                    <th>Nama</th>
                    <th>NIK</th>
                    <th>Jam Checkin</th>
                    <th>Tujuan</th>
                    <th>Jam Checkout</th>
                    <th>Risk</th>
                    <th>Skor</th>
                    <th>Foto</th>
                    <th>Aksi</th>
                </tr>
                </thead>
                <tbody id="historyBody">
                <tr>
                    <td colspan="9">Memuat data...</td>
                </tr>
                </tbody>
            </table>
        </div>
        
        <!-- Pagination -->
        <div class="pagination-container" id="historyPagination" style="display: none;">
            <div class="pagination-info">
                <span id="historyPageInfo"></span>
            </div>
            <div class="pagination-controls">
                <button id="historyPrevBtn" class="pagination-btn">Previous</button>
                <div id="historyPageNumbers" class="page-numbers"></div>
                <button id="historyNextBtn" class="pagination-btn">Next</button>
            </div>
        </div>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div id="deleteModal" class="modal">
    <div class="modal-content">
        <h3>Konfirmasi Hapus Data</h3>
        <p>Apakah Anda yakin ingin menghapus data visitor ini?</p>
        <div class="modal-buttons">
            <button id="confirmDelete" class="modal-btn modal-confirm">Hapus</button>
            <button id="cancelDelete" class="modal-btn modal-cancel">Batal</button>
        </div>
    </div>
</div>

<!-- Photo Preview Modal -->
<div id="photoModal" class="modal">
    <div class="modal-content photo-modal">
        <h3>Foto Visitor</h3>
        <div class="photo-container">
            <img id="photoPreview" src="" alt="Foto Visitor">
        </div>
        <div class="modal-buttons">
            <button id="closePhotoBtn" class="modal-btn modal-cancel">Tutup</button>
        </div>
    </div>
</div>

<script th:src="@{/js/visitor-history.js}" src="visitor-history.js"></script>
</body>
</html>
