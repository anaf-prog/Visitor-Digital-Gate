<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Tidak Ditemukan</title>
    <meta http-equiv="refresh" content="3;url=/dashboard">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            color: #1f2937;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            width: min(520px, 92vw);
            background: #ffffff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 24px;
        }

        p {
            margin: 8px 0;
            line-height: 1.5;
        }

        a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
<main class="card">
    <h1>404 - Halaman tidak ditemukan</h1>
    <p>URL yang kamu akses tidak tersedia.</p>
    <p>Kamu akan diarahkan ke dashboard dalam 3 detik.</p>
    <p>Kalau tidak ter-redirect, klik <a href="/dashboard">kembali ke dashboard</a>.</p>
</main>
</body>
</html>
